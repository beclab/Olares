# Periodic Linkerd identity issuer check (Jan/Jul 1). Rotates issuer when remaining validity < 6 months.
# Requires olares-cli with maintain-linkerd-pki on the node image or a dedicated job image.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: linkerd-pki-guardian
  namespace: linkerd
  labels:
    app.kubernetes.io/name: app-gateway
    app.kubernetes.io/component: linkerd-pki-guardian
spec:
  schedule: "0 0 1 1,7 *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: app-gateway
            app.kubernetes.io/component: linkerd-pki-guardian
        spec:
          restartPolicy: OnFailure
          serviceAccountName: linkerd-pki-guardian
          containers:
            - name: guardian
              image: olares-cli:local
              imagePullPolicy: IfNotPresent
              command:
                - olares-cli
                - maintain-linkerd-pki
              env:
                - name: OLARES_LINKERD_PKI_GUARDIAN
                  value: "1"
