# Modern manifest version is required: both workloadReplicas and
# overlayGateway are 1.12.6-only feature fields, which means the
# validateModernFieldRequiresManifestVersion gate would otherwise
# short-circuit the test before the chart-render-time overlay workload
# check (the actual subject of TestLint_OverlayGatewayWorkloadMissing)
# ever runs.
olaresManifest.version: "0.13.0"
olaresManifest.type: app
apiVersion: v1
metadata:
  name: wlrbad
  icon: https://example.com/icon.png
  description: fixture
  title: Fixture
  version: 1.0.0
entrances:
  - name: main
    host: wlrbad
    port: 8080
    title: Main
    icon: https://example.com/e.png
    authLevel: public
    openMethod: default
spec:
  versionName: v1
  requiredCpu: 100m
  limitedCpu: 200m
  requiredMemory: 128Mi
  limitedMemory: 256Mi
  requiredDisk: 1Gi
  supportArch: [amd64, arm64]
permission:
  appData: false
workloadReplicas:
  wlrbad: 1
overlayGateway:
  enable: true
  entrances:
    - port: 8096
      title: WL Overlay
      workload: ghost
      description: "Access in LAN"
      protocol: tcp
options:
  policies: []
  resetCookie: { enabled: false }
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.3-0,<1.12.6"
