{{- if .Values.demo.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-echo
  namespace: {{ include "app-gateway.namespace" . }}
  labels:
    applications.app.bytetrade.io/author: bytetrade.io
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ include "app-gateway.namespace" . }}
      sectionName: http
  hostnames:
    - {{ .Values.demo.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: http-echo
          port: 80
          weight: 1
{{- end }}
