apiVersion: v1
systemEnvs:
  # 现在叫DID_GATE_URL
  # 相关的系统组件的代码也需要统一修改，下面别的环境变量也一样
  - envName: OLARES_SYSTEM_DID_SERVICE
    default: "https://did-gate-v3.bttcdn.com/"
    type: url
    editable: true
    required: true
    description: ""
  # 现在叫OLARES_SYSTEM_SPACE_URL
  - envName: OLARES_SYSTEM_CLOUD_SERVICE
    default: "https://cloud-api.bttcdn.com/"
    type: url
    editable: true
    required: true
    description: ""
  # 现在叫FIREBASE_PUSH_URL
  - envName: OLARES_SYSTEM_PUSH_SERVICE
    default: "https://firebase-push-test.bttcdn.com/v1/api/push"
    type: url
    editable: true
    required: true
    description: ""
  # 现在叫FRP_LIST_URL
  - envName: OLARES_SYSTEM_FRP_INDEX_SERVICE
    default: "https://terminus-frp.snowinning.com"
    type: url
    editable: true
    required: true
    description: ""
  # 现在叫TAILSCALE_CONTROLPLANE_URL
  - envName: OLARES_SYSTEM_VPN_CONTROL_SERVICE
    default: "https://controlplane.snowinning.com"
    type: url
    editable: true
    required: true
    description: ""
  # 现在叫MARKET_PROVIDER
  - envName: OLARES_SYSTEM_MARKET_SERVICE
    default: appstore-server-prod.bttcdn.com
    type: domain
    editable: true
    required: true
    description: ""
  # 现在叫TERMINUS_CERT_SERVICE_API
  - envName: OLARES_SYSTEM_CERT_SERVICE
    default: "https://terminus-cert.snowinning.com"
    type: url
    editable: true
    required: true
    description: ""
  # 现在叫TERMINUS_DNS_SERVICE_API
  - envName: OLARES_SYSTEM_DNS_SERVICE
    default: "https://terminus-dnsop.snowinning.com"
    type: url
    editable: true
    required: true
    description: ""
  # 现在叫DOWNLOAD_CDN_URL
  - envName: OLARES_SYSTEM_CDN_SERVICE
    default: "https://dc3p1870nn3cj.cloudfront.net"
    type: url
    editable: true
    required: true
    description: ""
  # 现在叫OLARES_SYSTEM_ROOT_DIR
  # 路径相关的统一以PATH作为后缀
  # api相关的统一以SERVICE作为后缀
  - envName: OLARES_SYSTEM_ROOT_PATH
    value: /olares
    editable: false
    required: true
    description: ""
  # 这个需要动态生成
  - envName: OLARES_SYSTEM_ROOTFS_TYPE
    default: fs
    editable: false
    required: true
    description: ""
  # 这个需要动态生成
  - envName: OLARES_SYSTEM_CUDA_VERSION
    default: "12.9"
    editable: false
    required: true
    description: ""
  # 现在叫COREDNS_SVC
  # 改成 OLARES_SYSTEM_COREDNS_SERVICE / OLARES_CLUSTER_DNS_SERVICE / KUBERNETES_DNS_SERVICE?
  # 考虑统一命名的话，可能类似别的组件以 OLARES_SYSTEM_${COMPONENT}_${SUB_COMPONENT}_SERVICE 作为命名规则，那就是 OLARES_CLUSTER_DNS_SERVICE
  # 不过这个变量也可以考虑去掉，实际意义不大且有矛盾，所有集群内的组件都应该能自行获取才对?
  - envName: OLARES_SYSTEM_CLUSTER_DNS_SERVICE
    value: "10.233.0.3"
    editable: false
    type: ip
    required: true
    description: ""
