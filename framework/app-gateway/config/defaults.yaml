# app-gateway single source of truth for chart defaults (no service mesh).
namespace: os-gateway

gateway:
  name: app-gateway
  gatewayClassName: olares-app-gateway

envoyProxy:
  enabled: true
  name: app-gateway-envoy-proxy
  accessLog:
    enabled: true

# Cluster-internal HTTPS on Gateway :443. Cert sync via app-service EntranceTLS;
# when certs are not ready the https listener stays NotReady while :80 stays up.
tls:
  enabled: true

vendor:
  linkerdNamespace: os-mesh
