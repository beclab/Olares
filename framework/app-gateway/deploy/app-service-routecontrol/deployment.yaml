---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-service-routecontrol
  namespace: app-gateway
  labels:
    app.kubernetes.io/name: app-service-routecontrol
    app.kubernetes.io/component: control-plane
    applications.app.bytetrade.io/author: bytetrade.io
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-service-routecontrol
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-service-routecontrol
        app.kubernetes.io/component: control-plane
      annotations:
        linkerd.io/inject: enabled
    spec:
      serviceAccountName: app-service-routecontrol
      containers:
        - name: manager
          image: ghcr.io/beclab/app-service-routecontrol:latest
          imagePullPolicy: IfNotPresent
          args:
            - --gateway-namespace=app-gateway
            - --gateway-name=app-gateway
            - --gateway-section=http
            - --health-probe-bind-address=:8091
            - --metrics-bind-address=:8090
          ports:
            - containerPort: 8090
              name: metrics
            - containerPort: 8091
              name: probe
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: probe
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
