---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-ext-authz
  namespace: app-gateway
  labels:
    app.kubernetes.io/name: app-service-ext-authz
    app.kubernetes.io/component: ext-authz
    applications.app.bytetrade.io/author: bytetrade.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-service-ext-authz
  namespace: app-gateway
  labels:
    app.kubernetes.io/name: app-service-ext-authz
    app.kubernetes.io/component: ext-authz
    applications.app.bytetrade.io/author: bytetrade.io
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: app-service-ext-authz
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-service-ext-authz
        app.kubernetes.io/component: ext-authz
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/skip-inbound-ports: "9001,9002"
    spec:
      serviceAccountName: app-service-ext-authz
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: app-service-ext-authz
      containers:
        - name: adapter
          image: ghcr.io/beclab/app-service-ext-authz:latest
          imagePullPolicy: IfNotPresent
          args:
            - --grpc-listen=:9001
            - --http-listen=:9002
            - --mode=allow
          ports:
            - containerPort: 9001
              name: grpc
            - containerPort: 9002
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: app-service-ext-authz
  namespace: app-gateway
  labels:
    app.kubernetes.io/name: app-service-ext-authz
    app.kubernetes.io/component: ext-authz
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: app-service-ext-authz
  ports:
    - name: grpc
      port: 9001
      targetPort: 9001
      protocol: TCP
    - name: http
      port: 9002
      targetPort: 9002
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app-service-ext-authz
  namespace: app-gateway
  labels:
    app.kubernetes.io/name: app-service-ext-authz
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-service-ext-authz
