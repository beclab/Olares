apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# PoC: NodePort patch for the Gateway Service is applied by script after EG creates the Service.
# Demo host annotation for smoke tests only.
configMapGenerator:
  - name: app-gateway-poc-config
    namespace: agw-demo
    literals:
      - DEMO_HOST=demo.agw.local
      - GATEWAY_NAMESPACE=os-framework
      - GATEWAY_NAME=app-gateway
