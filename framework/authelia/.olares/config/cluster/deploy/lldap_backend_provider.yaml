---
apiVersion: v1
kind: Service
metadata:
  name: lldap-provider-svc
  namespace: "{{ .Release.Namespace }}"
spec:
  type: ClusterIP
  selector:
    app: system-provider
  ports:
    - name: server
      protocol: TCP
      port: 28080
      targetPort: 28080
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backend:lldap-provider
  annotations:
    provider-registry-ref: {{ .Release.Namespace }}/lldap-provider-svc
    provider-service-ref: lldap-service.os-platform:17171
rules:
  - nonResourceURLs:
      - "/readonly/snapshot"
    verbs: ["*"]

---
kind: ConfigMap
apiVersion: v1
metadata:
  name: lldap-provider-nginx-config
  namespace: "{{ .Release.Namespace }}"
  annotations:
    kubesphere.io/creator: bytetrade.io
data:
  lldap.conf: |-
    server {
        listen 8080;
        server_name  lldap-provider-svc.{{ .Release.Namespace }};
        # Gzip Settings
        gzip on;
        gzip_disable "msie6";
        gzip_min_length 1k;
        gzip_buffers 16 64k;
        gzip_http_version 1.1;
        gzip_comp_level 6;
        gzip_types *;
        index index.html;
        location / {
          proxy_pass http://lldap-service.os-platform:17171;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection '$connection_upgrade';
        }
    }
