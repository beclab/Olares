olaresManifest.version: "0.12.0"
olaresManifest.type: app
apiVersion: v1
metadata:
  name: wlreplicas
  icon: https://example.com/icon.png
  description: fixture
  title: Fixture
  version: 1.0.0
entrances:
  - name: main
    host: wlreplicas
    port: 8080
    title: Main
    icon: https://example.com/e.png
    authLevel: public
    openMethod: default
spec:
  versionName: v1
  requiredCpu: 100m
  limitedCpu: 200m
  requiredMemory: 128Mi
  limitedMemory: 256Mi
  requiredDisk: 1Gi
  supportArch: [amd64, arm64]
permission:
  appData: false
  appCommon: true
  externalData: true
workloadReplicas:
  wlreplicas: 1
overlayGateway:
  enable: true
  entrances:
    - port: 8096
      title: WL Overlay
      workload: wlreplicas
      description: "Access in LAN"
      protocol: tcp
options:
  policies: []
  resetCookie: { enabled: false }
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.3-0,<1.12.6"
