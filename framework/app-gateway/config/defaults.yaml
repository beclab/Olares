# app-gateway 统一配置（唯一真源）
# 修改命名空间或网关名时只改本文件，并同步 .olares/config/user/helm-charts/app-gateway/values.yaml

namespace: app-gateway

gateway:
  name: app-gateway
  gatewayClassName: olares-app-gateway

envoyProxy:
  enabled: true
  name: app-gateway-envoy-proxy
  accessLog:
    enabled: true

mesh:
  linkerd:
    enabled: true
    opaquePorts: "10080,19001,19002,19003"

demo:
  enabled: true
  host: demo.agw.local
  # Debug-only: CLI rollout/wait for curl-client & http-echo mesh. Release builds keep false.
  meshDebug: false

# Envoy Gateway ext_authz: allow-all baseline; failOpen=false denies
# ingress when the PEP is down. PEP runs in-process on app-service
# (os-framework). Cross-namespace backendRef needs ReferenceGrant in
# os-framework (helm-charts/.../securitypolicy-ext-authz-referencegrant.yaml).
extAuthz:
  enabled: true
  name: app-gateway-ext-authz-allowall
  failOpen: false
  service:
    name: app-service
    namespace: os-framework
    port: 9001

# Linkerd 控制面独立命名空间；Envoy Gateway 控制面与 Gateway API 业务对象共用上方 namespace。
vendor:
  linkerdNamespace: linkerd
