apiVersion: v1
kind: Namespace
metadata:
  name: os-mesh
  labels:
    app.kubernetes.io/name: app-gateway
    app.kubernetes.io/component: linkerd-control-plane
    linkerd.io/is-control-plane: "true"
    config.linkerd.io/admission-webhooks: disabled
    kubelets.v1.cni.cncf.io/enable-hostports: "true"
  annotations:
    # Must run before linkerd-pki-init Role/Job (weight -5). Do not set
    # hook-delete-policy: deleting this NS would wipe the control plane.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: linkerd-pki-init
  namespace: os-mesh
  labels:
    app.kubernetes.io/name: app-gateway
    app.kubernetes.io/component: linkerd-pki-init
  annotations:
    helm.sh/hook: pre-install, pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: linkerd-pki-init
  namespace: os-mesh
  labels:
    app.kubernetes.io/name: app-gateway
    app.kubernetes.io/component: linkerd-pki-init
  annotations:
    helm.sh/hook: pre-install, pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: linkerd-pki-init
  namespace: os-mesh
  labels:
    app.kubernetes.io/name: app-gateway
    app.kubernetes.io/component: linkerd-pki-init
  annotations:
    helm.sh/hook: pre-install, pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
subjects:
  - kind: ServiceAccount
    name: linkerd-pki-init
    namespace: os-mesh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: linkerd-pki-init
---
apiVersion: batch/v1
kind: Job
metadata:
  name: linkerd-pki-init
  namespace: os-mesh
  labels:
    app.kubernetes.io/name: app-gateway
    app.kubernetes.io/component: linkerd-pki-init
  annotations:
    helm.sh/hook: pre-install, pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-gateway
        app.kubernetes.io/component: linkerd-pki-init
      annotations:
        linkerd.io/inject: disabled
    spec:
      serviceAccountName: linkerd-pki-init
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: linkerd-pki-init
          image: beclab/linkerd-pki-guardian@sha256:3dbde1a3829034216e72b7ef332c09f62a96b22ef408ab4aae1a63fd2162f72e
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/linkerd-pki-guardian
            - bootstrap
            - --oneshot
          env:
            - name: GUARDIAN_LINKERD_NS
              value: os-mesh
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
