name: Release CLI

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      ref:
        type: string
      repository:
        type: string
      release-id:
        type: string
      publish-npm:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
      ref:
        type: string
      repository:
        type: string
      release-id:
        type: string
      publish-npm:
        type: boolean
        default: true
jobs:
  goreleaser:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}

      - name: Add Local Git Tag For GoReleaser
        run: git tag ${{ inputs.version }}
        continue-on-error: true

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.24.11
          
      - name: Install x86_64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install ARM cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v3.1.0
        with:
          distribution: goreleaser
          workdir: './cli'
          version: v1.18.2
          args: release --clean
        env:
          OLARES_RELEASE_ID: ${{ inputs.release-id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert binary version was injected
        working-directory: cli
        run: |
          set -euo pipefail
          binary=$(find ./output -type f -name 'olares-cli' -path '*linux_amd64*' | head -n1)
          if [ -z "$binary" ]; then
            echo "::error::could not locate built linux_amd64 olares-cli binary under cli/output"
            find ./output -maxdepth 2 -type f | sed 's/^/  /'
            exit 1
          fi
          actual=$("$binary" --version 2>&1)
          expected="${{ inputs.version }}"
          expected_stripped="${expected#v}"
          if echo "$actual" | grep -qE '0\.0\.0-development'; then
            echo "::error::binary still reports placeholder version; ldflags did not take effect"
            echo "binary: $binary"
            echo "output: $actual"
            exit 1
          fi
          if ! echo "$actual" | grep -qF "$expected_stripped"; then
            echo "::error::binary version output '$actual' does not contain expected '$expected_stripped'"
            exit 1
          fi
          echo "binary version OK: $actual"

      - name: Install coscmd
        run: pip install coscmd        

      - name: Configure coscmd
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
          END_POINT: ${{ secrets.END_POINT }}
        run: |
          coscmd config -a $TENCENT_SECRET_ID \
                        -s $TENCENT_SECRET_KEY \
                        -b $COS_BUCKET \
                        -r $COS_REGION 

      - name: Upload to CDN
        run: |
          cd cli/output && for file in $(ls *.tar.gz | grep -v no-release-id); do
            coscmd upload "$file" ${{ secrets.REPO_PATH }}${file}
          done

  publish-npm:
    needs: [goreleaser]
    if: ${{ inputs.publish-npm }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync npm package.json version to release input
        working-directory: cli/npm
        run: |
          npm version "${{ inputs.version }}" \
            --no-git-tag-version \
            --allow-same-version

      - name: Publish @olares/cli (dist-tag latest)
        working-directory: cli/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_OLARES_PUBLISH_TOKEN }}
        run: npm publish --access public
