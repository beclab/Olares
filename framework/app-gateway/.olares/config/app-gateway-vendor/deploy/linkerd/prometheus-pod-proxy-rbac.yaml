# Grant platform Prometheus ServiceAccount access to pods/proxy for Linkerd scrape via apiserver.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: linkerd-prometheus-pod-proxy-reader
rules:
  - apiGroups: [""]
    resources: ["pods/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: linkerd-prometheus-pod-proxy-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: linkerd-prometheus-pod-proxy-reader
subjects:
  - kind: ServiceAccount
    name: prometheus-k8s
    namespace: kubesphere-monitoring-system
