apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ include "app-gateway.namespace" . }}
  labels:
    applications.app.bytetrade.io/author: bytetrade.io
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  {{- if .Values.envoyProxy.enabled }}
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ .Values.envoyProxy.name }}
  {{- end }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    {{- if .Values.tls.enabled }}
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        # Keep a syntactically valid cert ref so Gateway updates are accepted
        # before the actual entrance TLS Secret is synced.
        certificateRefs:
          - kind: Secret
            group: ""
            name: app-gateway-tls
    {{- end }}
