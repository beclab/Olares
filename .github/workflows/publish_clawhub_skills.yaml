name: Publish olares-cli skills to ClawHub

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run validation only (no upload)'
        type: boolean
        default: false
      slugs:
        description: 'Space-separated slugs to publish (empty = all 6)'
        type: string
        default: ''
      changelog:
        description: 'Changelog text for this publish'
        type: string
        default: 'Automated publish from GitHub Actions'
      tags:
        description: 'Comma-separated ClawHub tags'
        type: string
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS — clawhub depends on cli-spinners which uses
          # ES2025 import attributes (`import x from '...' with { type: 'json' }`),
          # unsupported on Node < 20.10 and only behind a flag on 20.10–20.x.
          node-version: '22'

      - name: Install clawhub CLI
        run: npm i -g clawhub

      - name: Verify clawhub login
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [[ -z "$CLAWHUB_TOKEN" ]]; then
            echo "::error::CLAWHUB_TOKEN secret is not set"
            exit 1
          fi
          clawhub login --token "$CLAWHUB_TOKEN" >/dev/null
          clawhub whoami

      - name: Publish skills
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          CLAWHUB_CHANGELOG: ${{ inputs.changelog }}
          CLAWHUB_TAGS: ${{ inputs.tags }}
        run: |
          chmod +x cli/skills/publish.sh
          args=()
          if [[ "${{ inputs.dry-run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          # shellcheck disable=SC2206
          slugs=(${{ inputs.slugs }})
          args+=("${slugs[@]}")
          ./cli/skills/publish.sh "${args[@]}"
